name: Release
on:
  push:
    tags:
      - 'v*'

permissions:        # ← add this block
  contents: write   # ← allows creating releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o odin-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o odin-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -o odin-windows-amd64.exe .
      
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            odin-linux-amd64
            odin-linux-arm64
            odin-windows-amd64.exe